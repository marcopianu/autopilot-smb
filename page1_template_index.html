<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #dcc1ab; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; font-family: 'Source Sans 3', 'Helvetica Neue', Arial, sans-serif; }
.page { width: 640px; height: 850px; position: relative; overflow: hidden; background: linear-gradient(145deg, #faeadc 0%, #f2d8c0 40%, #e6cbb2 100%); flex-shrink: 0; box-shadow: 0 25px 40px -12px rgba(70,30,5,0.4); }
.blob { position: absolute; border-radius: 50%; pointer-events: none; z-index: 0; }
.blob-1 { width: 420px; height: 420px; background: radial-gradient(circle at 36% 32%, #fbc3a5 0%, #c4623a 46%, #64270c 100%); box-shadow: inset -22px -26px 60px rgba(0,0,0,0.3), 30px 40px 90px rgba(90,35,5,0.35); top: -130px; left: -130px; }
.blob-2 { width: 300px; height: 300px; background: radial-gradient(circle at 38% 34%, #fadcbc 0%, #b85830 48%, #5c200c 100%); box-shadow: inset -16px -20px 50px rgba(0,0,0,0.25), 24px 30px 70px rgba(80,30,2,0.3); bottom: -90px; right: -90px; }
.blob-3 { width: 200px; height: 200px; background: radial-gradient(circle at 40% 35%, #fff3e8 0%, #e8b890 46%, #b07048 100%); box-shadow: inset -12px -16px 40px rgba(0,0,0,0.18), 18px 24px 55px rgba(120,55,15,0.25); top: 18%; right: 5%; }
.blob-4 { width: 280px; height: 280px; background: radial-gradient(circle at 30% 25%, #fae1c7 0%, #c27e54 50%, #6b3f1f 100%); box-shadow: inset -18px -18px 45px #3b1e0b, 25px 30px 70px #954e1e; bottom: 10%; left: -50px; }
.blob-5 { width: 350px; height: 350px; background: radial-gradient(circle at 65% 70%, #fdebd0 0%, #b4623a 55%, #572811 100%); box-shadow: inset 16px 16px 50px #271007, -20px -20px 70px #ac5a32; top: 40%; right: -120px; }
.blob-6 { width: 190px; height: 190px; background: radial-gradient(circle at 20% 30%, #fcf1e6 0%, #d6895a 48%, #8b4d27 100%); box-shadow: inset -6px -8px 30px #381e0c, 15px 25px 60px #b45f30; bottom: 30%; left: 15%; }
.blob-7 { width: 240px; height: 240px; background: radial-gradient(circle at 75% 20%, #f3d6bb 0%, #c26d40 52%, #733d17 100%); box-shadow: inset -10px -20px 40px #311507, 20px 15px 70px #a24e24; top: 5%; left: 20%; }
.blob-8 { width: 160px; height: 160px; background: radial-gradient(circle at 55% 55%, #ffeede 0%, #cb8d62 55%, #9b572b 100%); box-shadow: inset -10px -10px 35px #4b200a, 18px 18px 55px #a65222; bottom: 15%; right: 15%; }
.arc-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; opacity: 0.9; }
.text-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: flex-end; z-index: 3; }
.label {
  font-size: 10px;
  font-weight: 400;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: #8b5030;
  padding: 0 0 18px 48px;
}
.title-area {
  margin: 0 32px 20px 32px;
  padding: 28px 32px 24px 32px;
  background: rgba(250, 235, 215, 0.35);
  backdrop-filter: blur(24px) brightness(1.12) saturate(140%); /* slightly stronger blur */
  -webkit-backdrop-filter: blur(24px) brightness(1.12) saturate(140%);
  border-radius: 20px;
  border: 1px solid rgba(255, 240, 210, 0.5);
}
.page-title { font-size: 30px; font-weight: 300; color: #2a0e02; line-height: 1.22; letter-spacing: -0.02em; margin-bottom: 14px; }
.page-title strong { font-weight: 600; }
.divider { width: 32px; height: 2px; background: #c4623a; margin-bottom: 12px; border-radius: 2px; }
.page-subtitle { font-size: 13px; font-weight: 300; font-style: italic; color: #5a3018; line-height: 1.65; letter-spacing: 0.03em; }
.footer { padding: 0 48px 28px 48px; display: flex; align-items: center; justify-content: space-between; }
.footer-logo { display: flex; align-items: center; gap: 9px; }
.footer-triangle { width: 0; height: 0; border-top: 6px solid transparent; border-bottom: 6px solid transparent; border-left: 11px solid #c4623a; }
.footer-brand { font-size: 14px; font-weight: 300; color: #3d1a08; letter-spacing: 0.07em; text-transform: lowercase; }
.footer-year { font-size: 11px; font-weight: 300; color: #8b6040; letter-spacing: 0.12em; }
</style>
</head>
<body>
<div class="page">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
  <div class="blob blob-4"></div>
  <div class="blob blob-5"></div>
  <div class="blob blob-6"></div>
  <div class="blob blob-7"></div>
  <div class="blob blob-8"></div>
  <svg class="arc-svg" viewBox="0 0 640 850" xmlns="http://www.w3.org/2000/svg" overflow="hidden">
    <defs>
      <linearGradient id="g1" x1="0%" y1="100%" x2="100%" y2="0%" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#f3bb8c"/><stop offset="40%" stop-color="#c45f2e"/><stop offset="90%" stop-color="#944c22"/></linearGradient>
      <filter id="glow" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      <clipPath id="clip"><rect width="640" height="850"/></clipPath>
    </defs>
    <g clip-path="url(#clip)" opacity="0.85">
      <circle cx="720" cy="920" r="685" fill="none" stroke="#bc6a42" stroke-width="11" filter="url(#glow)" opacity="0.6"/>
      <circle cx="720" cy="920" r="576" fill="none" stroke="url(#g1)" stroke-width="10" opacity="0.9"/>
      <circle cx="720" cy="920" r="472" fill="none" stroke="#dc9e78" stroke-width="3" stroke-dasharray="4 11" opacity="0.8"/>
      <circle cx="720" cy="920" r="378" fill="none" stroke="#f0bc94" stroke-width="2" stroke-dasharray="3 12" opacity="0.7"/>
      <circle cx="720" cy="920" r="290" fill="none" stroke="#fcdbbc" stroke-width="1.5" stroke-dasharray="1.5 15" opacity="0.6"/>
      <circle cx="720" cy="920" r="215" fill="none" stroke="#d6834e" stroke-width="1.8" stroke-dasharray="2 18" opacity="0.55"/>
      <circle cx="720" cy="920" r="500" fill="none" stroke="#dfa77b" stroke-width="2.2" stroke-dasharray="3 24" opacity="0.5"/>
      <circle cx="720" cy="920" r="640" fill="none" stroke="#bf6f40" stroke-width="2" stroke-dasharray="8 18" opacity="0.4"/>
      <circle cx="720" cy="920" r="330" fill="none" stroke="#e8bb97" stroke-width="4" stroke-dasharray="2 8" opacity="0.65"/>
      <circle cx="-120" cy="-80" r="450" fill="none" stroke="#d28a5c" stroke-width="3" stroke-dasharray="7 14" opacity="0.5"/>
      <circle cx="-120" cy="-80" r="360" fill="none" stroke="#ecb187" stroke-width="4" stroke-dasharray="2 12" opacity="0.6"/>
      <circle cx="-120" cy="-80" r="270" fill="none" stroke="#faefe3" stroke-width="2.5" stroke-dasharray="1 10" opacity="0.5"/>
      <circle cx="800" cy="400" r="550" fill="none" stroke="#e2a77a" stroke-width="3" stroke-dasharray="6 15" opacity="0.5"/>
      <circle cx="800" cy="400" r="450" fill="none" stroke="#c17444" stroke-width="5" stroke-dasharray="2 20" opacity="0.45"/>
      <circle cx="800" cy="400" r="330" fill="none" stroke="#fadcc0" stroke-width="2" stroke-dasharray="1 30" opacity="0.55"/>
      <line x1="0" y1="0" x2="640" y2="850" stroke="#c98555" stroke-width="2" stroke-dasharray="5 10" opacity="0.5"/>
      <line x1="640" y1="0" x2="200" y2="850" stroke="#ac5c34" stroke-width="2.2" stroke-dasharray="12 8" opacity="0.45"/>
      <line x1="640" y1="300" x2="-50" y2="700" stroke="#e3af84" stroke-width="3" stroke-dasharray="3 12" opacity="0.4"/>
      <line x1="200" y1="-50" x2="500" y2="900" stroke="#d69464" stroke-width="2" stroke-dasharray="4 16" opacity="0.5"/>
      <line x1="500" y1="-30" x2="100" y2="850" stroke="#b26638" stroke-width="2.5" stroke-dasharray="7 11" opacity="0.6"/>
      <path d="M100,200 Q250,100 400,250 T600,300" stroke="#ce8f61" fill="none" stroke-width="2.5" stroke-dasharray="5 10" opacity="0.5"/>
    </g>
  </svg>
  <div class="text-layer">
    <p class="label">AUTOMATION BLUEPRINT · 2026</p>
    <div class="title-area">
      <h1 class="page-title">The Weekly Till <strong>Automation Blueprint 2026</strong><br>for Retail &amp; Inventory Tracking</h1>
      <div class="divider"></div>
      <p class="page-subtitle">Leverage automation and forecasting to eliminate costly inventory mismanagement and boost profits.</p>
    </div>
    <div class="footer">
      <div class="footer-logo">
        <div class="footer-triangle"></div>
        <span class="footer-brand">weekly till</span>
      </div>
      <span class="footer-year">2026</span>
    </div>
  </div>
</div>
</body>
</html>
