<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Weekly Till · Automation Blueprint</title>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@200;300;400;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #e9d7c5;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            font-family: 'Source Sans 3', 'Helvetica Neue', Arial, sans-serif;
        }

        .page {
            width: 640px;
            height: 850px;
            position: relative;
            overflow: hidden;
            background: linear-gradient(150deg, #FDF5EE 0%, #F5E2CF 50%, #EDDCC8 100%);
            flex-shrink: 0;
            box-shadow: 0 20px 35px -8px rgba(90, 40, 15, 0.3);
        }

        .blob { position: absolute; border-radius: 50%; pointer-events: none; z-index: 0; }
        .blob-1 {
            width: 420px; height: 420px;
            background: radial-gradient(circle at 36% 32%, #F0A07A 0%, #C4623A 46%, #7A2D10 100%);
            box-shadow: inset -18px -22px 55px rgba(0,0,0,0.22), 28px 36px 90px rgba(100,38,12,0.22);
            top: -130px; left: -130px;
        }
        .blob-2 {
            width: 300px; height: 300px;
            background: radial-gradient(circle at 38% 34%, #E8C4A0 0%, #B85830 48%, #6E2810 100%);
            box-shadow: inset -14px -18px 45px rgba(0,0,0,0.2), 20px 28px 70px rgba(90,34,10,0.2);
            bottom: -90px; right: -90px;
        }
        .blob-3 {
            width: 200px; height: 200px;
            background: radial-gradient(circle at 40% 35%, #FAF0E4 0%, #E8B890 46%, #C08060 100%);
            box-shadow: inset -10px -14px 35px rgba(0,0,0,0.14), 14px 20px 50px rgba(150,80,40,0.18);
            top: 18%; right: 5%;
        }

        .arc-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        .text-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 0;
            z-index: 2;
            color: #2C1A0E;
        }

        .title-area { padding: 56px 38px 0; }

        .page-title {
            font-size: 42px;
            font-weight: 500;
            color: #3D1A08;
            line-height: 1.2;
            letter-spacing: -0.01em;
            margin-bottom: 20px;
            text-shadow: 0 2px 6px rgba(255, 235, 210, 0.6);
            max-width: 500px;
        }

        .page-subtitle {
            font-size: 18px;
            font-weight: 300;
            color: #5C3A20;
            line-height: 1.55;
            max-width: 350px;
            text-shadow: 0 1px 4px rgba(255, 245, 225, 0.7);
            font-style: italic;
        }

        .footer {
            padding: 0 34px 28px;
            display: flex;
            align-items: center;
            justify-content: flex-start;
        }

        .footer-logo { display: flex; align-items: center; gap: 8px; }

        .footer-triangle {
            width: 0; height: 0;
            border-top: 7px solid transparent;
            border-bottom: 7px solid transparent;
            border-left: 13px solid #C4623A;
            flex-shrink: 0;
            filter: drop-shadow(0 2px 4px rgba(140, 70, 20, 0.3));
        }

        .footer-brand {
            font-size: 18px;
            font-weight: 400;
            color: #3D1A08;
            letter-spacing: 0.01em;
            text-transform: lowercase;
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="blob blob-1" aria-hidden="true"></div>
        <div class="blob blob-2" aria-hidden="true"></div>
        <div class="blob blob-3" aria-hidden="true"></div>

        <svg class="arc-svg" viewBox="0 0 640 850" xmlns="http://www.w3.org/2000/svg" overflow="hidden">
            <defs>
                <linearGradient id="warmArcGradient" x1="15%" y1="90%" x2="85%" y2="10%" gradientUnits="userSpaceOnUse">
                    <stop offset="0%"   stop-color="#F0A07A" />
                    <stop offset="45%"  stop-color="#C4623A" />
                    <stop offset="100%" stop-color="#9C4A28" />
                </linearGradient>
                <filter id="warmGlow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="6" result="blur" />
                    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                </filter>
                <filter id="warmSolidGlow" x="-10%" y="-10%" width="120%" height="120%">
                    <feGaussianBlur stdDeviation="4" result="blur" />
                    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                </filter>
                <clipPath id="pageClip"><rect width="640" height="850"/></clipPath>
            </defs>
            <g clip-path="url(#pageClip)">
                <circle cx="720" cy="920" r="685" fill="none" stroke="#B85830" stroke-width="11" stroke-linecap="round" filter="url(#warmSolidGlow)" opacity="0.9" />
                <circle cx="720" cy="920" r="576" fill="none" stroke="url(#warmArcGradient)" stroke-width="10" stroke-linecap="round" filter="url(#warmGlow)" opacity="1" />
                <circle cx="720" cy="920" r="472" fill="none" stroke="#E8B890" stroke-width="3" stroke-dasharray="4 11" stroke-linecap="round" opacity="0.8" />
                <circle cx="720" cy="920" r="378" fill="none" stroke="#F0A07A" stroke-width="2" stroke-dasharray="3 12" stroke-linecap="round" opacity="0.7" />
                <circle cx="720" cy="920" r="290" fill="none" stroke="#FAF0E4" stroke-width="1.5" stroke-dasharray="1.5 15" stroke-linecap="round" opacity="0.5" />
                <circle cx="720" cy="920" r="215" fill="none" stroke="#C4623A" stroke-width="1.8" stroke-dasharray="2 18" stroke-linecap="round" opacity="0.35" />
                <circle cx="720" cy="920" r="500" fill="none" stroke="#E8C4A0" stroke-width="2.2" stroke-dasharray="3 24" stroke-linecap="round" opacity="0.4" />
            </g>
        </svg>

        <div class="text-layer">
            <div class="title-area">

                <!-- Title: hardcoded structure, only business_type + pain_point are dynamic.
                     These come directly from nodes 3/4 (formatter output), not from the AI JSON. -->
                <h1 class="page-title">
                    The Weekly Till Automation Blueprint 2026<br> for [[business_type]] &amp; [[pain_point]]

                </h1>

                <!-- ~15-20 words. One punchy italic sentence.
                     Format: "What it takes for [business_type] to solve [pain_point] and win." -->
                <p class="page-subtitle">[[P1_SUBTITLE]]</p>

            </div>

            <footer class="footer">
                <div class="footer-logo">
                    <div class="footer-triangle"></div>
                    <span class="footer-brand">weekly till</span>
                </div>
            </footer>
        </div>
    </div>
</body>
</html>
