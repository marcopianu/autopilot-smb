<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Weekly Till · smart‑contrast blueprint</title>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@200;300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* RESET & BASE — stronger, smarter, more balls, more lines */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #dcc1ab;   /* deeper warm tone to pop the glass effect */
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            font-family: 'Source Sans 3', 'Helvetica Neue', Arial, sans-serif;
        }

        /* MAIN CANVAS — bigger contrast playground */
        .page {
            width: 640px;
            height: 850px;
            position: relative;
            overflow: hidden;
            background: linear-gradient(145deg, #faeadc 0%, #f2d8c0 40%, #e6cbb2 100%);
            flex-shrink: 0;
            box-shadow: 0 25px 40px -12px rgba(70, 30, 5, 0.4);
        }

        /* -------------------- 3D BALLS — many more, juicy & volumetric -------------------- */
        .blob {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            will-change: transform;
            transition: filter 0.2s ease;
        }

        /* original three – but we keep & enhance */
        .blob-1 {
            width: 420px; height: 420px;
            background: radial-gradient(circle at 36% 32%, #fbc3a5 0%, #c4623a 46%, #64270c 100%);
            box-shadow: inset -22px -26px 60px rgba(0,0,0,0.3), 30px 40px 90px rgba(90, 35, 5, 0.35);
            top: -130px; left: -130px;
        }
        .blob-2 {
            width: 300px; height: 300px;
            background: radial-gradient(circle at 38% 34%, #fadcbc 0%, #b85830 48%, #5c200c 100%);
            box-shadow: inset -16px -20px 50px rgba(0,0,0,0.25), 24px 30px 70px rgba(80, 30, 2, 0.3);
            bottom: -90px; right: -90px;
        }
        .blob-3 {
            width: 200px; height: 200px;
            background: radial-gradient(circle at 40% 35%, #fff3e8 0%, #e8b890 46%, #b07048 100%);
            box-shadow: inset -12px -16px 40px rgba(0,0,0,0.18), 18px 24px 55px rgba(120, 55, 15, 0.25);
            top: 18%; right: 5%;
        }

        /* ——— new 3D spheres (more balls) ——— */
        .blob-4 {
            width: 280px; height: 280px;
            background: radial-gradient(circle at 30% 25%, #fae1c7 0%, #c27e54 50%, #6b3f1f 100%);
            box-shadow: inset -18px -18px 45px #3b1e0b, 25px 30px 70px #954e1e;
            bottom: 10%; left: -50px;
        }
        .blob-5 {
            width: 350px; height: 350px;
            background: radial-gradient(circle at 65% 70%, #fdebd0 0%, #b4623a 55%, #572811 100%);
            box-shadow: inset 16px 16px 50px #271007, -20px -20px 70px #ac5a32;
            top: 40%; right: -120px;
        }
        .blob-6 {
            width: 190px; height: 190px;
            background: radial-gradient(circle at 20% 30%, #fcf1e6 0%, #d6895a 48%, #8b4d27 100%);
            box-shadow: inset -6px -8px 30px #381e0c, 15px 25px 60px #b45f30;
            bottom: 30%; left: 15%;
        }
        .blob-7 {
            width: 240px; height: 240px;
            background: radial-gradient(circle at 75% 20%, #f3d6bb 0%, #c26d40 52%, #733d17 100%);
            box-shadow: inset -10px -20px 40px #311507, 20px 15px 70px #a24e24;
            top: 5%; left: 20%;
        }
        .blob-8 {
            width: 160px; height: 160px;
            background: radial-gradient(circle at 55% 55%, #ffeede 0%, #cb8d62 55%, #9b572b 100%);
            box-shadow: inset -10px -10px 35px #4b200a, 18px 18px 55px #a65222;
            bottom: 15%; right: 15%;
        }
        /* ————————————————— LINES — MUCH MORE LINES (SVG + new groups) ————————————————— */

        .arc-svg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;            /* lines between blobs and text */
            opacity: 0.9;
        }

        /* text layer stays on top, but now with SMART background adaptation */
        .text-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 0;
            z-index: 3;            /* highest, but we put adaptive glass over it */
            color: #1f1208;         /* deep brown base */
        }

        /* ---------- SMART TEXT AREAS : dynamic blur + soft light adapt ---------- */
        .title-area {
            display: inline-block;          /* background only wraps text */
            max-width: 550px;
            background: rgba(255, 235, 215, 0.2);    /* very translucent, lets balls show */
            backdrop-filter: blur(12px) brightness(1.15) saturate(150%);
            -webkit-backdrop-filter: blur(12px) brightness(1.15) saturate(150%);
            border-radius: 0 40px 40px 0;
            padding: 24px 48px 24px 40px;
            margin-top: 50px;
            border: 1px solid rgba(255, 240, 210, 0.45);
            border-left: none;
            box-shadow: 0 12px 25px -10px rgba(140, 60, 20, 0.2);
            /* text itself remains crisp */
        }

        .page-title {
            font-size: 42px;
            font-weight: 550;
            line-height: 1.18;
            letter-spacing: -0.01em;
            color: #2f190b;            /* deep readable brown */
            text-shadow: 0 2px 5px rgba(255, 240, 200, 0.5);
            margin-bottom: 16px;
            /* smart adaptation via background already */
        }

        .page-subtitle {
            font-size: 19px;
            font-weight: 330;
            line-height: 1.5;
            color: #371f0e;
            max-width: 440px;
            text-shadow: 0 1px 4px rgba(255, 245, 215, 0.7);
            font-style: italic;
            background: rgba(245, 225, 200, 0.15);   /* extra soft behind subtitle */
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border-radius: 0 20px 20px 0;
            padding: 6px 12px 6px 8px;
            margin-left: -8px;          /* slight extension */
            display: inline-block;
        }

        /* footer also gets the smart glass */
        .footer {
            display: inline-block;
            align-self: flex-start;
            margin: 0 0 30px 25px;
            background: rgba(200, 160, 125, 0.2);
            backdrop-filter: blur(14px) brightness(1.2);
            -webkit-backdrop-filter: blur(14px) brightness(1.2);
            border-radius: 0 30px 30px 0;
            padding: 14px 40px 14px 30px;
            border: 1px solid rgba(255, 235, 200, 0.4);
            border-left: none;
            box-shadow: 0 6px 16px rgba(100, 45, 15, 0.2);
        }

        .footer-logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .footer-triangle {
            width: 0; height: 0;
            border-top: 8px solid transparent;
            border-bottom: 8px solid transparent;
            border-left: 16px solid #aa5533;    /* richer oxide */
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.15));
        }

        .footer-brand {
            font-size: 20px;
            font-weight: 430;
            color: #2a1509;
            letter-spacing: 0.02em;
            text-transform: lowercase;
            text-shadow: 0 2px 5px #ffe1b0;
        }

        /* extra micro-adjust: title-area hover (optional) – no effect on functionality */
        .title-area:hover, .footer:hover {
            background: rgba(240, 215, 185, 0.25);
            backdrop-filter: blur(10px) brightness(1.2);
            transition: 0.2s;
        }

        /* ----- keep dynamic placeholders exactly as required ----- */
    </style>
</head>
<body>
    <div class="page">

        <!-- 3D BALLS: now 8 volumetric spheres, some huge, all with light interplay -->
        <div class="blob blob-1" aria-hidden="true"></div>
        <div class="blob blob-2" aria-hidden="true"></div>
        <div class="blob blob-3" aria-hidden="true"></div>
        <div class="blob blob-4" aria-hidden="true"></div>
        <div class="blob blob-5" aria-hidden="true"></div>
        <div class="blob blob-6" aria-hidden="true"></div>
        <div class="blob blob-7" aria-hidden="true"></div>
        <div class="blob blob-8" aria-hidden="true"></div>

        <!-- LINES, LINES, LINES – countless arcs, lines, circles, now with two centers + extra strokes -->
        <svg class="arc-svg" viewBox="0 0 640 850" xmlns="http://www.w3.org/2000/svg" overflow="hidden">
            <defs>
                <linearGradient id="warmArcGradient" x1="0%" y1="100%" x2="100%" y2="0%" gradientUnits="userSpaceOnUse">
                    <stop offset="0%" stop-color="#f3bb8c" />
                    <stop offset="40%" stop-color="#c45f2e" />
                    <stop offset="90%" stop-color="#944c22" />
                </linearGradient>
                <linearGradient id="coolArcGradient" x1="20%" y1="20%" x2="80%" y2="80%">
                    <stop offset="0%" stop-color="#eccaae" />
                    <stop offset="60%" stop-color="#b45f2e" />
                </linearGradient>
                <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="5" result="blur" />
                    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                </filter>
                <clipPath id="pageClip"><rect width="640" height="850"/></clipPath>
            </defs>
            <g clip-path="url(#pageClip)" opacity="0.85">

                <!-- ***** MANY, MANY MORE CIRCLES (first cluster – bottom right origin) ***** -->
                <circle cx="720" cy="920" r="685" fill="none" stroke="#bc6a42" stroke-width="11" stroke-linecap="round" filter="url(#softGlow)" opacity="0.6" />
                <circle cx="720" cy="920" r="576" fill="none" stroke="url(#warmArcGradient)" stroke-width="10" stroke-linecap="round" opacity="0.9" />
                <circle cx="720" cy="920" r="472" fill="none" stroke="#dc9e78" stroke-width="3" stroke-dasharray="4 11" opacity="0.8" />
                <circle cx="720" cy="920" r="378" fill="none" stroke="#f0bc94" stroke-width="2" stroke-dasharray="3 12" opacity="0.7" />
                <circle cx="720" cy="920" r="290" fill="none" stroke="#fcdbbc" stroke-width="1.5" stroke-dasharray="1.5 15" opacity="0.6" />
                <circle cx="720" cy="920" r="215" fill="none" stroke="#d6834e" stroke-width="1.8" stroke-dasharray="2 18" opacity="0.55" />
                <circle cx="720" cy="920" r="500" fill="none" stroke="#dfa77b" stroke-width="2.2" stroke-dasharray="3 24" opacity="0.5" />
                <!-- extra radii for density -->
                <circle cx="720" cy="920" r="640" fill="none" stroke="#bf6f40" stroke-width="2" stroke-dasharray="8 18" opacity="0.4" />
                <circle cx="720" cy="920" r="330" fill="none" stroke="#e8bb97" stroke-width="4" stroke-dasharray="2 8" opacity="0.65" />

                <!-- ***** NEW CLUSTER – top left origin (more lines crossing text zone but glass handles it) ***** -->
                <circle cx="-120" cy="-80" r="450" fill="none" stroke="#d28a5c" stroke-width="3" stroke-dasharray="7 14" opacity="0.5" />
                <circle cx="-120" cy="-80" r="560" fill="none" stroke="#b76434" stroke-width="8" stroke-linecap="round" opacity="0.3" />
                <circle cx="-120" cy="-80" r="360" fill="none" stroke="#ecb187" stroke-width="4" stroke-dasharray="2 12" opacity="0.6" />
                <circle cx="-120" cy="-80" r="270" fill="none" stroke="#faefe3" stroke-width="2.5" stroke-dasharray="1 10" opacity="0.5" />
                <circle cx="-120" cy="-80" r="190" fill="none" stroke="#cfa478" stroke-width="2" stroke-dasharray="3 18" opacity="0.7" />

                <!-- ***** THIRD ORIGIN (right edge, mid) – creates crossing curves ***** -->
                <circle cx="800" cy="400" r="550" fill="none" stroke="#e2a77a" stroke-width="3" stroke-dasharray="6 15" opacity="0.5" />
                <circle cx="800" cy="400" r="450" fill="none" stroke="#c17444" stroke-width="5" stroke-dasharray="2 20" opacity="0.45" />
                <circle cx="800" cy="400" r="330" fill="none" stroke="#fadcc0" stroke-width="2" stroke-dasharray="1 30" opacity="0.55" />
                <circle cx="800" cy="400" r="210" fill="none" stroke="#a5542c" stroke-width="1.5" stroke-dasharray="4 12" opacity="0.65" />

                <!-- ***** STRAIGHT LINES (radiating from corners) – even more linear energy ***** -->
                <line x1="-50" y1="200" x2="500" y2="850" stroke="#bb6a3f" stroke-width="1.5" stroke-dasharray="6 9" opacity="0.5"/>
                <line x1="0" y1="0" x2="640" y2="850" stroke="#c98555" stroke-width="2" stroke-dasharray="5 10" opacity="0.5"/>
                <line x1="640" y1="0" x2="200" y2="850" stroke="#ac5c34" stroke-width="2.2" stroke-dasharray="12 8" opacity="0.45"/>
                <line x1="640" y1="300" x2="-50" y2="700" stroke="#e3af84" stroke-width="3" stroke-dasharray="3 12" opacity="0.4"/>
                <line x1="200" y1="-50" x2="500" y2="900" stroke="#d69464" stroke-width="2" stroke-dasharray="4 16" opacity="0.5"/>
                <line x1="500" y1="-30" x2="100" y2="850" stroke="#b26638" stroke-width="2.5" stroke-dasharray="7 11" opacity="0.6"/>

                <!-- extra wavy path for organic feel -->
                <path d="M100,200 Q250,100 400,250 T600,300" stroke="#ce8f61" fill="none" stroke-width="2.5" stroke-dasharray="5 10" opacity="0.5"/>
                <path d="M50,600 Q200,500 350,700 T550,750" stroke="#ba7344" fill="none" stroke-width="2" stroke-dasharray="3 12" opacity="0.5"/>
            </g>
        </svg>

        <!-- TEXT LAYER – now smart glass, no ball/line touches the readability -->
        <div class="text-layer">
            <div class="title-area">
                <!-- exactly the required dynamic placeholders – never touched by lines/balls -->
                <h1 class="page-title">
                    The Weekly Till Automation Blueprint 2026<br> for [[business_type]] &amp; [[pain_point]]
                </h1>
                <p class="page-subtitle">[[P1_SUBTITLE]]</p>
            </div>

            <footer class="footer">
                <div class="footer-logo">
                    <div class="footer-triangle"></div>
                    <span class="footer-brand">weekly till</span>
                </div>
            </footer>
        </div>

        <!-- extra invisible glass shim? no, everything works -->
    </div>
    <!-- the design now: 8 volumetric balls, 20+ extra lines/circles, smart blur background that changes apparent color based on underlying ball/line intensity -->
</body>
</html>
