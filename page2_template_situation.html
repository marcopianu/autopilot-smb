<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI HR Report – Overview</title>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,300;0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #dccbb8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Source Sans 3', 'Helvetica Neue', Arial, sans-serif;
            padding: 1rem;
        }

        .page {
            width: 640px;
            height: 950px;
            position: relative;
            overflow: hidden;
            background: linear-gradient(150deg, #FDF5EE 0%, #F5E2CF 50%, #EDDCC8 100%);
            border-radius: 32px;
            box-shadow: 0 20px 35px -8px rgba(90, 40, 15, 0.3);
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
        }

        .blob { position: absolute; border-radius: 50%; pointer-events: none; z-index: 0; }
        .blob-1 {
            width: 420px; height: 420px;
            background: radial-gradient(circle at 36% 32%, #F0A07A 0%, #C4623A 46%, #7A2D10 100%);
            box-shadow: inset -18px -22px 55px rgba(0,0,0,0.22), 28px 36px 90px rgba(100,38,12,0.22);
            top: -130px; left: -130px;
        }
        .blob-2 {
            width: 300px; height: 300px;
            background: radial-gradient(circle at 38% 34%, #E8C4A0 0%, #B85830 48%, #6E2810 100%);
            box-shadow: inset -14px -18px 45px rgba(0,0,0,0.2), 20px 28px 70px rgba(90,34,10,0.2);
            bottom: -90px; right: -90px;
        }
        .blob-3 {
            width: 200px; height: 200px;
            background: radial-gradient(circle at 40% 35%, #FAF0E4 0%, #E8B890 46%, #C08060 100%);
            box-shadow: inset -10px -14px 35px rgba(0,0,0,0.14), 14px 20px 50px rgba(150,80,40,0.18);
            top: 15%; right: 2%;
        }

        .arc-svg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

        .content-card {
            position: relative;
            z-index: 2;
            background: rgba(255, 250, 240, 0.85);
            backdrop-filter: blur(3px);
            border-radius: 28px;
            margin: 24px 22px 18px 22px;
            padding: 28px 24px 16px 24px;
            flex: 1;
            display: flex;
            flex-direction: column;
            box-shadow: 0 15px 30px -10px rgba(80, 40, 15, 0.2);
            border: 1px solid rgba(255, 235, 210, 0.8);
            overflow-y: auto;
        }

        .page-heading {
            font-size: 38px;
            font-weight: 300;
            color: #3D1A08;
            margin-bottom: 18px;
            line-height: 1.15;
            letter-spacing: -0.01em;
        }

        .body-text {
            font-size: 14px;
            line-height: 1.6;
            color: #4a2e1a;
            font-weight: 400;
            margin-bottom: 16px;
        }

        .stats-card {
            background: #fff9f2;
            border-radius: 20px;
            overflow: hidden;
            margin-top: 12px;
            box-shadow: 0 8px 20px -6px rgba(140, 70, 30, 0.2);
            border: 1px solid #E8C4A0;
        }

        .stats-header { background: #C4623A; padding: 12px 20px; }
        .stats-header-label { font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #ffffff; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; }

        .stat-cell { padding: 20px 18px 18px; }
        .stat-cell.right { border-left: 1px solid #EEDCC8; }
        .stat-cell.row2, .stat-cell.row3 { border-top: 1px solid #EEDCC8; }

        .stat-number { display: flex; align-items: flex-start; line-height: 1; }
        .stat-digits { font-size: 48px; font-weight: 700; color: #3D1A08; line-height: 1; letter-spacing: -0.02em; }
        .stat-pct { font-size: 22px; font-weight: 600; color: #B85830; margin-top: 8px; margin-left: 2px; line-height: 1; }
        .stat-desc { font-size: 11.5px; line-height: 1.5; color: #5C3A20; margin-top: 8px; font-weight: 400; }

        .page-footer {
            margin-top: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0 4px;
            border-top: 1px dashed #E8B890;
        }

        .footer-logo { display: flex; align-items: center; gap: 8px; text-decoration: none; }
        .footer-triangle {
            width: 0; height: 0;
            border-top: 7px solid transparent;
            border-bottom: 7px solid transparent;
            border-left: 13px solid #C4623A;
            flex-shrink: 0;
            filter: drop-shadow(0 2px 4px rgba(140,70,20,0.2));
        }
        .footer-brand { font-size: 16px; font-weight: 400; color: #3D1A08; letter-spacing: 0.01em; text-transform: lowercase; }
        .footer-page { font-size: 14px; font-weight: 400; color: #8B5A3A; }

        .content-card::-webkit-scrollbar { width: 6px; }
        .content-card::-webkit-scrollbar-track { background: #f0e0d0; border-radius: 8px; }
        .content-card::-webkit-scrollbar-thumb { background: #C4623A; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="page">
        <div class="blob blob-1" aria-hidden="true"></div>
        <div class="blob blob-2" aria-hidden="true"></div>
        <div class="blob blob-3" aria-hidden="true"></div>

        <svg class="arc-svg" viewBox="0 0 640 950" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="warmArcGradient" x1="15%" y1="90%" x2="85%" y2="10%" gradientUnits="userSpaceOnUse">
                    <stop offset="0%"   stop-color="#F0A07A" />
                    <stop offset="45%"  stop-color="#C4623A" />
                    <stop offset="100%" stop-color="#9C4A28" />
                </linearGradient>
                <filter id="warmGlow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="6" result="blur" />
                    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                </filter>
                <filter id="warmSolidGlow" x="-10%" y="-10%" width="120%" height="120%">
                    <feGaussianBlur stdDeviation="4" result="blur" />
                    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                </filter>
                <clipPath id="pageClip"><rect width="640" height="950"/></clipPath>
            </defs>
            <g clip-path="url(#pageClip)">
                <circle cx="720" cy="1020" r="685" fill="none" stroke="#B85830" stroke-width="11" stroke-linecap="round" filter="url(#warmSolidGlow)" opacity="0.8" />
                <circle cx="720" cy="1020" r="576" fill="none" stroke="url(#warmArcGradient)" stroke-width="10" stroke-linecap="round" filter="url(#warmGlow)" opacity="1" />
                <circle cx="720" cy="1020" r="472" fill="none" stroke="#E8B890" stroke-width="3" stroke-dasharray="4 11" stroke-linecap="round" opacity="0.75" />
                <circle cx="720" cy="1020" r="378" fill="none" stroke="#F0A07A" stroke-width="2" stroke-dasharray="3 12" stroke-linecap="round" opacity="0.7" />
                <circle cx="720" cy="1020" r="290" fill="none" stroke="#FAF0E4" stroke-width="1.5" stroke-dasharray="1.5 15" stroke-linecap="round" opacity="0.5" />
                <circle cx="720" cy="1020" r="215" fill="none" stroke="#C4623A" stroke-width="1.8" stroke-dasharray="2 18" stroke-linecap="round" opacity="0.35" />
                <circle cx="720" cy="1020" r="500" fill="none" stroke="#E8C4A0" stroke-width="2.2" stroke-dasharray="3 24" stroke-linecap="round" opacity="0.4" />
            </g>
        </svg>

        <div class="content-card">
            <h1 class="page-heading">Overview</h1>

            <!-- ~44-50 words. Situation intro: what the pain point is and why it matters.
                 Based on COL$D (Situation) + your reasoning. No fluff. -->
            <p class="body-text">{{P2_P1}}</p>

            <!-- ~44-50 words. Expand the situation: who is affected and what the daily cost looks like.
                 Based on COL$D + your reasoning. -->
            <p class="body-text">{{P2_P2}}</p>

            <!-- ~44-50 words. Closing paragraph: what solving this unlocks. Forward-looking.
                 Based on COL$D + your reasoning. End with a motivating benchmark sentence. -->
            <p class="body-text">{{P2_P3}}</p>

            <div class="stats-card">
                <div class="stats-header">
                    <span class="stats-header-label">Six Key Takeaways</span>
                </div>
                <div class="stats-grid">

                    <!-- Stat 1: Choose a plausible % based on COL$D reasoning.
                         Desc: 16-27 words. Insight on adoption or awareness gap. -->
                    <div class="stat-cell row1 left">
                        <div class="stat-number">
                            <span class="stat-digits">{{P2_S1_NUM}}</span><span class="stat-pct">%</span>
                        </div>
                        <p class="stat-desc">{{P2_S1_DESC}}</p>
                    </div>

                    <!-- Stat 2: Choose a plausible % based on COL$D reasoning.
                         Desc: 16-27 words. Insight on confidence or planning gap. -->
                    <div class="stat-cell row1 right">
                        <div class="stat-number">
                            <span class="stat-digits">{{P2_S2_NUM}}</span><span class="stat-pct">%</span>
                        </div>
                        <p class="stat-desc">{{P2_S2_DESC}}</p>
                    </div>

                    <!-- Stat 3: Choose a plausible % based on COL$D reasoning.
                         Desc: 16-27 words. Insight on skill or expertise gap. -->
                    <div class="stat-cell row2 left">
                        <div class="stat-number">
                            <span class="stat-digits">{{P2_S3_NUM}}</span><span class="stat-pct">%</span>
                        </div>
                        <p class="stat-desc">{{P2_S3_DESC}}</p>
                    </div>

                    <!-- Stat 4: Choose a plausible % based on COL$D reasoning.
                         Desc: 16-27 words. Insight on time or cost savings potential. -->
                    <div class="stat-cell row2 right">
                        <div class="stat-number">
                            <span class="stat-digits">{{P2_S4_NUM}}</span><span class="stat-pct">%</span>
                        </div>
                        <p class="stat-desc">{{P2_S4_DESC}}</p>
                    </div>

                    <!-- Stat 5: Choose a plausible % based on COL$D reasoning.
                         Desc: 16-27 words. Insight on growth or demand trend. -->
                    <div class="stat-cell row3 left">
                        <div class="stat-number">
                            <span class="stat-digits">{{P2_S5_NUM}}</span><span class="stat-pct">%</span>
                        </div>
                        <p class="stat-desc">{{P2_S5_DESC}}</p>
                    </div>

                    <!-- Stat 6: Choose a plausible % based on COL$D reasoning.
                         Desc: 16-27 words. Insight on risk or cost of inaction. -->
                    <div class="stat-cell row3 right">
                        <div class="stat-number">
                            <span class="stat-digits">{{P2_S6_NUM}}</span><span class="stat-pct">%</span>
                        </div>
                        <p class="stat-desc">{{P2_S6_DESC}}</p>
                    </div>

                </div>
            </div>

            <div class="page-footer">
                <div class="footer-logo">
                    <div class="footer-triangle"></div>
                    <span class="footer-brand">weekly till</span>
                </div>
                <span class="footer-page">2</span>
            </div>
        </div>
    </div>
</body>
</html>
