<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Till · overview (smart glass · more balls · more lines)</title>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:ital,wght@0,300;0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #dccbb8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Source Sans 3', 'Helvetica Neue', Arial, sans-serif;
            padding: 1rem;
        }

        .page {
            width: 640px;
            height: 950px;
            position: relative;
            overflow: hidden;
            background: linear-gradient(150deg, #FDF5EE 0%, #F5E2CF 50%, #EDDCC8 100%);
            border-radius: 32px;
            box-shadow: 0 20px 35px -8px rgba(90, 40, 15, 0.3);
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
        }

        /* -------------------- 3D BALLS — many more, juicy & volumetric (8 total) -------------------- */
        .blob {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            will-change: transform;
        }
        /* original three – kept */
        .blob-1 {
            width: 420px; height: 420px;
            background: radial-gradient(circle at 36% 32%, #F0A07A 0%, #C4623A 46%, #7A2D10 100%);
            box-shadow: inset -18px -22px 55px rgba(0,0,0,0.22), 28px 36px 90px rgba(100,38,12,0.22);
            top: -130px; left: -130px;
        }
        .blob-2 {
            width: 300px; height: 300px;
            background: radial-gradient(circle at 38% 34%, #E8C4A0 0%, #B85830 48%, #6E2810 100%);
            box-shadow: inset -14px -18px 45px rgba(0,0,0,0.2), 20px 28px 70px rgba(90,34,10,0.2);
            bottom: -90px; right: -90px;
        }
        .blob-3 {
            width: 200px; height: 200px;
            background: radial-gradient(circle at 40% 35%, #FAF0E4 0%, #E8B890 46%, #C08060 100%);
            box-shadow: inset -10px -14px 35px rgba(0,0,0,0.14), 14px 20px 50px rgba(150,80,40,0.18);
            top: 15%; right: 2%;
        }
        /* ——— new 3D spheres (more balls) ——— */
        .blob-4 {
            width: 280px; height: 280px;
            background: radial-gradient(circle at 30% 25%, #fae1c7 0%, #c27e54 50%, #6b3f1f 100%);
            box-shadow: inset -18px -18px 45px #3b1e0b, 25px 30px 70px #954e1e;
            bottom: 5%; left: -30px;
        }
        .blob-5 {
            width: 350px; height: 350px;
            background: radial-gradient(circle at 65% 70%, #fdebd0 0%, #b4623a 55%, #572811 100%);
            box-shadow: inset 16px 16px 50px #271007, -20px -20px 70px #ac5a32;
            top: 35%; right: -120px;
        }
        .blob-6 {
            width: 190px; height: 190px;
            background: radial-gradient(circle at 20% 30%, #fcf1e6 0%, #d6895a 48%, #8b4d27 100%);
            box-shadow: inset -6px -8px 30px #381e0c, 15px 25px 60px #b45f30;
            bottom: 40%; left: 10%;
        }
        .blob-7 {
            width: 240px; height: 240px;
            background: radial-gradient(circle at 75% 20%, #f3d6bb 0%, #c26d40 52%, #733d17 100%);
            box-shadow: inset -10px -20px 40px #311507, 20px 15px 70px #a24e24;
            top: 2%; left: 25%;
        }
        .blob-8 {
            width: 160px; height: 160px;
            background: radial-gradient(circle at 55% 55%, #ffeede 0%, #cb8d62 55%, #9b572b 100%);
            box-shadow: inset -10px -10px 35px #4b200a, 18px 18px 55px #a65222;
            bottom: 20%; right: 10%;
        }

        /* SVG LAYER — MUCH MORE LINES (three origins, extra strokes) */
        .arc-svg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
            opacity: 0.9;
        }

        /* ---------- SMART TEXT LAYER: main glass panel + inner glass stats ---------- */
        .content-card {
            position: relative;
            z-index: 2;
            /* smart glass: highly translucent, strong blur & brightness */
            background: rgba(250, 240, 225, 0.25);
            backdrop-filter: blur(14px) brightness(1.25) saturate(160%);
            -webkit-backdrop-filter: blur(14px) brightness(1.25) saturate(160%);
            border-radius: 32px;
            margin: 24px 22px 18px 22px;
            padding: 28px 24px 16px 24px;
            flex: 1;
            display: flex;
            flex-direction: column;
            box-shadow: 0 18px 35px -10px rgba(70, 30, 5, 0.3);
            border: 1px solid rgba(255, 235, 200, 0.45);
            overflow-y: auto;
            color: #1f1208; /* deep base */
        }

        .page-heading {
            font-size: 38px;
            font-weight: 330;
            color: #2f1a0b;
            margin-bottom: 18px;
            line-height: 1.15;
            letter-spacing: -0.01em;
            text-shadow: 0 2px 5px rgba(255, 235, 200, 0.5);
        }

        .body-text {
            font-size: 14px;
            line-height: 1.65;
            color: #2b1a0c;
            font-weight: 400;
            margin-bottom: 18px;
            background: rgba(245, 225, 205, 0.2);
            backdrop-filter: blur(5px) brightness(1.1);
            -webkit-backdrop-filter: blur(5px) brightness(1.1);
            border-radius: 0 20px 20px 0;
            padding: 8px 16px 8px 12px;
            border-left: 3px solid #c98a5c;
            box-shadow: 0 4px 12px rgba(120, 60, 20, 0.1);
        }

        /* stats card – also smart glass, but a bit more opaque to highlight numbers */
        .stats-card {
            background: rgba(255, 245, 230, 0.3);
            backdrop-filter: blur(10px) brightness(1.2) saturate(150%);
            -webkit-backdrop-filter: blur(10px) brightness(1.2) saturate(150%);
            border-radius: 28px;
            overflow: hidden;
            margin-top: 12px;
            box-shadow: 0 15px 30px -10px rgba(100, 45, 15, 0.25);
            border: 1px solid rgba(230, 185, 140, 0.6);
        }

        .stats-header {
            background: rgba(185, 85, 45, 0.7);   /* semi‑transparent, blends with blur */
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            padding: 12px 20px;
            border-bottom: 1px solid #eeba8c;
        }
        .stats-header-label {
            font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
            color: #fff4e5; text-shadow: 0 1px 3px #401e0a;
        }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; }

        .stat-cell {
            padding: 20px 18px 18px;
            background: rgba(255, 245, 230, 0.2); /* very subtle inner glass */
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }
        .stat-cell.right { border-left: 1px solid rgba(220, 170, 130, 0.6); }
        .stat-cell.row2, .stat-cell.row3 { border-top: 1px solid rgba(220, 170, 130, 0.6); }

        .stat-number { display: flex; align-items: flex-start; line-height: 1; }
        .stat-digits {
            font-size: 48px; font-weight: 700;
            color: #2f1a0b;
            line-height: 1; letter-spacing: -0.02em;
            text-shadow: 0 2px 6px #ffefd0;
        }
        .stat-pct {
            font-size: 22px; font-weight: 600;
            color: #ac522c;
            margin-top: 8px; margin-left: 2px; line-height: 1;
            text-shadow: 0 1px 3px #ffdbb8;
        }
        .stat-desc {
            font-size: 11.5px; line-height: 1.5;
            color: #2f1c0c;
            margin-top: 8px; font-weight: 400;
        }

        .page-footer {
            margin-top: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0 4px;
            border-top: 1px dashed rgba(210, 140, 90, 0.7);
            background: rgba(245, 225, 200, 0.2);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border-radius: 0 0 20px 20px;
            padding: 10px 16px;
        }

        .footer-logo { display: flex; align-items: center; gap: 8px; text-decoration: none; }
        .footer-triangle {
            width: 0; height: 0;
            border-top: 7px solid transparent;
            border-bottom: 7px solid transparent;
            border-left: 13px solid #b45a30;
            flex-shrink: 0;
            filter: drop-shadow(0 2px 4px rgba(140,70,20,0.3));
        }
        .footer-brand { font-size: 16px; font-weight: 400; color: #2d180a; letter-spacing: 0.01em; text-transform: lowercase; text-shadow: 0 1px 4px #ffeac0; }
        .footer-page { font-size: 14px; font-weight: 400; color: #633f20; background: rgba(255,235,200,0.3); padding: 2px 10px; border-radius: 30px; backdrop-filter: blur(4px); }

        /* scrollbar remains */
        .content-card::-webkit-scrollbar { width: 6px; }
        .content-card::-webkit-scrollbar-track { background: #e6cfb5; border-radius: 8px; }
        .content-card::-webkit-scrollbar-thumb { background: #b06238; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="page">
        <!-- 8 VOLUMETRIC 3D BALLS -->
        <div class="blob blob-1" aria-hidden="true"></div>
        <div class="blob blob-2" aria-hidden="true"></div>
        <div class="blob blob-3" aria-hidden="true"></div>
        <div class="blob blob-4" aria-hidden="true"></div>
        <div class="blob blob-5" aria-hidden="true"></div>
        <div class="blob blob-6" aria-hidden="true"></div>
        <div class="blob blob-7" aria-hidden="true"></div>
        <div class="blob blob-8" aria-hidden="true"></div>

        <!-- LINES LINES LINES — even more than page 1 (three origins, extra arcs) -->
        <svg class="arc-svg" viewBox="0 0 640 950" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="warmArcGradient" x1="15%" y1="90%" x2="85%" y2="10%" gradientUnits="userSpaceOnUse">
                    <stop offset="0%"   stop-color="#F0A07A" />
                    <stop offset="45%"  stop-color="#C4623A" />
                    <stop offset="100%" stop-color="#9C4A28" />
                </linearGradient>
                <linearGradient id="softOrange" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#edb58b" />
                    <stop offset="100%" stop-color="#a84f25" />
                </linearGradient>
                <filter id="warmGlow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="6" result="blur" />
                    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                </filter>
                <clipPath id="pageClip"><rect width="640" height="950"/></clipPath>
            </defs>
            <g clip-path="url(#pageClip)" opacity="0.9">

                <!-- ***** BOTTOM RIGHT ORIGIN (dense circles) ***** -->
                <circle cx="720" cy="1020" r="685" fill="none" stroke="#B85830" stroke-width="11" stroke-linecap="round" filter="url(#warmGlow)" opacity="0.5" />
                <circle cx="720" cy="1020" r="576" fill="none" stroke="url(#warmArcGradient)" stroke-width="10" stroke-linecap="round" opacity="0.8" />
                <circle cx="720" cy="1020" r="472" fill="none" stroke="#E8B890" stroke-width="3" stroke-dasharray="4 11" opacity="0.7" />
                <circle cx="720" cy="1020" r="378" fill="none" stroke="#F0A07A" stroke-width="2" stroke-dasharray="3 12" opacity="0.65" />
                <circle cx="720" cy="1020" r="290" fill="none" stroke="#FAF0E4" stroke-width="1.5" stroke-dasharray="1.5 15" opacity="0.5" />
                <circle cx="720" cy="1020" r="215" fill="none" stroke="#C4623A" stroke-width="1.8" stroke-dasharray="2 18" opacity="0.4" />
                <circle cx="720" cy="1020" r="500" fill="none" stroke="#E8C4A0" stroke-width="2.2" stroke-dasharray="3 24" opacity="0.5" />
                <!-- extra radii -->
                <circle cx="720" cy="1020" r="640" fill="none" stroke="#ca7b4b" stroke-width="2.5" stroke-dasharray="8 20" opacity="0.45" />
                <circle cx="720" cy="1020" r="330" fill="none" stroke="#dc9a6b" stroke-width="4" stroke-dasharray="2 7" opacity="0.6" />

                <!-- ***** TOP LEFT ORIGIN (more crossing lines) ***** -->
                <circle cx="-120" cy="-80" r="450" fill="none" stroke="#cf8555" stroke-width="3" stroke-dasharray="7 14" opacity="0.5" />
                <circle cx="-120" cy="-80" r="560" fill="none" stroke="#b45e2e" stroke-width="8" stroke-linecap="round" opacity="0.3" />
                <circle cx="-120" cy="-80" r="360" fill="none" stroke="#ecb187" stroke-width="4" stroke-dasharray="2 12" opacity="0.6" />
                <circle cx="-120" cy="-80" r="270" fill="none" stroke="#faefe3" stroke-width="2.5" stroke-dasharray="1 10" opacity="0.5" />
                <circle cx="-120" cy="-80" r="190" fill="none" stroke="#cfa478" stroke-width="2" stroke-dasharray="3 18" opacity="0.7" />
                <circle cx="-120" cy="-80" r="620" fill="none" stroke="#b26130" stroke-width="3" stroke-dasharray="10 22" opacity="0.3" />

                <!-- ***** THIRD ORIGIN (right mid) ***** -->
                <circle cx="800" cy="400" r="550" fill="none" stroke="#e2a77a" stroke-width="3" stroke-dasharray="6 15" opacity="0.5" />
                <circle cx="800" cy="400" r="450" fill="none" stroke="#c17444" stroke-width="5" stroke-dasharray="2 20" opacity="0.45" />
                <circle cx="800" cy="400" r="330" fill="none" stroke="#fadcc0" stroke-width="2" stroke-dasharray="1 30" opacity="0.55" />
                <circle cx="800" cy="400" r="210" fill="none" stroke="#a5542c" stroke-width="1.5" stroke-dasharray="4 12" opacity="0.65" />

                <!-- ***** STRAIGHT LINES (radiating) – many ***** -->
                <line x1="-50" y1="200" x2="500" y2="950" stroke="#bb6a3f" stroke-width="1.5" stroke-dasharray="6 9" opacity="0.5"/>
                <line x1="0" y1="0" x2="640" y2="950" stroke="#c98555" stroke-width="2" stroke-dasharray="5 10" opacity="0.5"/>
                <line x1="640" y1="0" x2="200" y2="950" stroke="#ac5c34" stroke-width="2.2" stroke-dasharray="12 8" opacity="0.45"/>
                <line x1="640" y1="300" x2="-50" y2="800" stroke="#e3af84" stroke-width="3" stroke-dasharray="3 12" opacity="0.4"/>
                <line x1="200" y1="-50" x2="500" y2="1000" stroke="#d69464" stroke-width="2" stroke-dasharray="4 16" opacity="0.5"/>
                <line x1="500" y1="-30" x2="100" y2="950" stroke="#b26638" stroke-width="2.5" stroke-dasharray="7 11" opacity="0.6"/>
                <line x1="-30" y1="600" x2="670" y2="200" stroke="#d68f59" stroke-width="2" stroke-dasharray="3 18" opacity="0.5"/>
                <line x1="100" y1="800" x2="550" y2="-50" stroke="#b57a4e" stroke-width="1.8" stroke-dasharray="8 14" opacity="0.5"/>

                <!-- ***** WAVY ORGANIC PATHS ***** -->
                <path d="M100,200 Q250,100 400,250 T600,300" stroke="#ce8f61" fill="none" stroke-width="2.5" stroke-dasharray="5 10" opacity="0.5"/>
                <path d="M50,600 Q200,500 350,700 T550,750" stroke="#ba7344" fill="none" stroke-width="2" stroke-dasharray="3 12" opacity="0.5"/>
                <path d="M180,400 Q300,300 420,450 T580,500" stroke="#dbaa7c" fill="none" stroke-width="3" stroke-dasharray="6 14" opacity="0.5"/>
            </g>
        </svg>

        <!-- SMART GLASS CONTENT (all text areas adapt) -->
        <div class="content-card">
            <h1 class="page-heading">Overview</h1>

            <!-- ~44-50 words each, placeholders exactly as required -->
            <p class="body-text">[[P2_P1]]</p>
            <p class="body-text">[[P2_P2]]</p>
            <p class="body-text">[[P2_P3]]</p>

            <div class="stats-card">
                <div class="stats-header">
                    <span class="stats-header-label">Six Key Takeaways</span>
                </div>
                <div class="stats-grid">

                    <!-- Stat 1 -->
                    <div class="stat-cell row1 left">
                        <div class="stat-number">
                            <span class="stat-digits">[[P2_S1_NUM]]</span><span class="stat-pct">%</span>
                        </div>
                        <p class="stat-desc">[[P2_S1_DESC]]</p>
                    </div>
                    <!-- Stat 2 -->
                    <div class="stat-cell row1 right">
                        <div class="stat-number">
                            <span class="stat-digits">[[P2_S2_NUM]]</span><span class="stat-pct">%</span>
                        </div>
                        <p class="stat-desc">[[P2_S2_DESC]]</p>
                    </div>
                    <!-- Stat 3 -->
                    <div class="stat-cell row2 left">
                        <div class="stat-number">
                            <span class="stat-digits">[[P2_S3_NUM]]</span><span class="stat-pct">%</span>
                        </div>
                        <p class="stat-desc">[[P2_S3_DESC]]</p>
                    </div>
                    <!-- Stat 4 -->
                    <div class="stat-cell row2 right">
                        <div class="stat-number">
                            <span class="stat-digits">[[P2_S4_NUM]]</span><span class="stat-pct">%</span>
                        </div>
                        <p class="stat-desc">[[P2_S4_DESC]]</p>
                    </div>
                    <!-- Stat 5 -->
                    <div class="stat-cell row3 left">
                        <div class="stat-number">
                            <span class="stat-digits">[[P2_S5_NUM]]</span><span class="stat-pct">%</span>
                        </div>
                        <p class="stat-desc">[[P2_S5_DESC]]</p>
                    </div>
                    <!-- Stat 6 -->
                    <div class="stat-cell row3 right">
                        <div class="stat-number">
                            <span class="stat-digits">[[P2_S6_NUM]]</span><span class="stat-pct">%</span>
                        </div>
                        <p class="stat-desc">[[P2_S6_DESC]]</p>
                    </div>

                </div>
            </div>

            <div class="page-footer">
                <div class="footer-logo">
                    <div class="footer-triangle"></div>
                    <span class="footer-brand">weekly till</span>
                </div>
                <span class="footer-page">2</span>
            </div>
        </div>
    </div>
</body>
</html>
